<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Equalizer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #07071a;
  --surface: #0e0e28;
  --card:    #141430;
  --border:  #232350;
  --border2: #2d2d60;
  --accent:  #4a9eff;
  --red:     #ff4466;
  --green:   #4ecca3;
  --gold:    #ffbb44;
  --purple:  #aa44ff;
  --text:    #d8d8ff;
  --muted:   #6060a0;
  --dim:     #3030608;
  --r:       7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  padding: 7px;
  gap: 5px;
}

/* ── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

/* ── COMMON ──────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 11px; border:1px solid var(--border2);
  border-radius:5px; background:var(--card);
  color:var(--text); font-size:12px; cursor:pointer;
  white-space:nowrap; transition:background .15s,border-color .15s;
  font-family:inherit;
}
.btn:hover { background:var(--border); }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn.accent { background:rgba(74,158,255,.15); border-color:var(--accent); color:var(--accent); }
.btn.accent:hover { background:rgba(74,158,255,.28); }
.btn.green  { background:rgba(78,204,163,.12); border-color:var(--green); color:var(--green); }
.btn.red    { background:rgba(255,68,102,.12);  border-color:var(--red);   color:var(--red);  }

.lbl { font-size:10px; font-weight:700; text-transform:uppercase;
       letter-spacing:.6px; color:var(--muted); }
.sep { width:1px; height:22px; background:var(--border2); flex-shrink:0; }
.spacer { flex:1; }

select {
  background:var(--card); color:var(--text);
  border:1px solid var(--border2); border-radius:5px;
  padding:4px 8px; font-size:12px; cursor:pointer; font-family:inherit;
}
select:focus { outline:1px solid var(--accent); }

.file-btn {
  position:relative; display:inline-flex; align-items:center; gap:5px;
  padding:5px 11px; border:1px solid var(--accent); border-radius:5px;
  background:rgba(74,158,255,.1); color:var(--accent); font-size:12px;
  cursor:pointer; white-space:nowrap; transition:background .15s; font-family:inherit;
}
.file-btn:hover { background:rgba(74,158,255,.22); }
.file-btn input { position:absolute; opacity:0; inset:0; cursor:pointer; width:100%; }

/* ── TOOLBAR ─────────────────────────────── */
#toolbar {
  display:flex; align-items:center; gap:8px; flex-shrink:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:7px 13px; flex-wrap:wrap;
}
#app-title {
  font-size:14px; font-weight:800; color:var(--accent);
  letter-spacing:.5px; white-space:nowrap;
}
#signal-info {
  font-size:11px; color:var(--muted); max-width:220px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#backend-status {
  font-size:11px; padding:3px 9px; border-radius:10px;
  background:rgba(0,0,0,.3); white-space:nowrap;
}

/* ── VIEWERS ─────────────────────────────── */
#viewers-row {
  display:grid; grid-template-columns:1fr 1fr; gap:5px;
  height:165px; flex-shrink:0;
}
.viewer-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden; position:relative;
}
.viewer-tag {
  position:absolute; top:5px; left:9px;
  font-size:9px; font-weight:800; letter-spacing:1.2px;
  color:var(--muted); z-index:2; pointer-events:none;
}
.viewer-t {
  position:absolute; top:5px; right:9px;
  font-size:10px; color:var(--muted); z-index:2;
  pointer-events:none; font-family:monospace;
}
.viewer-wrap canvas { display:block; width:100%; height:100%; }

/* ── PLAYBACK BAR ────────────────────────── */
#pb-bar {
  display:flex; align-items:center; gap:7px; flex-shrink:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:6px 12px; flex-wrap:wrap;
}
input[type=range].speed-r {
  width:80px; accent-color:var(--accent);
  background:transparent; border:none; padding:0; cursor:pointer;
}
.scale-grp { display:flex; align-items:center; gap:8px; font-size:12px; }
.scale-grp label { display:flex; align-items:center; gap:4px; cursor:pointer; }
.scale-grp input[type=radio] { accent-color:var(--accent); width:13px; height:13px; }
#pb-time { font-family:monospace; font-size:12px; color:var(--muted); min-width:72px; }
#speed-lbl { font-family:monospace; font-size:12px; color:var(--muted); min-width:40px; }

/* ── ANALYSIS ROW ────────────────────────── */
#analysis-row {
  display:grid; grid-template-columns:1fr 265px 265px;
  gap:5px; flex:1; min-height:0; overflow:hidden;
}
.panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden;
  display:flex; flex-direction:column;
}
.p-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.p-title { font-size:9px; font-weight:800; letter-spacing:.9px;
           text-transform:uppercase; color:var(--muted); }
.p-body { flex:1; min-height:0; position:relative; }
.p-body canvas { display:block; width:100%; height:100%; }
#spec-col {
  display:flex; flex-direction:column; gap:5px; min-height:0;
}
#spec-col .panel { flex:1; min-height:0; }

/* ── EQ SECTION ──────────────────────────── */
#eq-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden; flex-shrink:0;
}
#eq-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 12px; border-bottom:1px solid var(--border);
}
#eq-sliders {
  display:flex; gap:0; align-items:flex-end;
  padding:10px 14px 12px; min-height:155px; overflow-x:auto;
}
.sl-col {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:0 9px; flex-shrink:0; min-width:66px;
}
.sl-val  { font-size:11px; color:var(--accent); font-family:monospace; font-weight:700; }
.sl-name {
  font-size:10px; color:var(--text); text-align:center;
  max-width:66px; word-break:break-word; font-weight:600; line-height:1.3;
}
input.eq-slider {
  -webkit-appearance:slider-vertical;
  writing-mode:vertical-lr; direction:rtl;
  width:26px; height:115px; padding:0; border:none;
  background:transparent; accent-color:var(--accent); cursor:pointer;
}
.add-btn {
  padding:8px 14px; background:transparent;
  border:1px dashed var(--border2); color:var(--muted);
  border-radius:6px; cursor:pointer; font-size:12px;
  margin-left:8px; transition:all .15s; flex-shrink:0;
  align-self:center; font-family:inherit;
}
.add-btn:hover { border-color:var(--accent); color:var(--accent); }
.eq-empty {
  color:var(--muted); font-size:13px;
  align-self:center; padding:20px;
}
#wv-result {
  font-size:11px; color:var(--muted);
  display:flex; align-items:center; gap:6px;
}

/* ── AI PANEL ────────────────────────────── */
#ai-panel {
  display:none; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--r);
  padding:10px 14px; flex-shrink:0;
}
#ai-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:8px; margin-top:8px;
}
.ai-card {
  background:var(--card); border:1px solid var(--border2);
  border-radius:6px; padding:10px; text-align:center;
}
.ai-ct { font-size:9px; color:var(--muted); text-transform:uppercase;
         letter-spacing:.5px; margin-bottom:5px; }
.ai-cv { font-size:17px; font-weight:700; color:var(--accent); }

/* ── TOAST ───────────────────────────────── */
#toast {
  position:fixed; bottom:18px; left:50%;
  transform:translateX(-50%) translateY(70px);
  padding:9px 20px; border-radius:20px; font-size:13px;
  font-weight:500; z-index:9999; pointer-events:none;
  opacity:0; transition:transform .28s,opacity .28s;
  max-width:92vw; text-align:center;
}
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.info    { background:#22225a; border:1px solid #4444aa; color:#bbbbff; }
#toast.success { background:#0f3328; border:1px solid #338855; color:#77ffcc; }
#toast.error   { background:#3a0f1a; border:1px solid #882244; color:#ffaaaa; }

/* ── LOADING OVERLAY ─────────────────────── */
#loading {
  position:fixed; inset:0; background:rgba(7,7,26,.75);
  display:none; align-items:center; justify-content:center;
  z-index:8888; font-size:14px; color:var(--text); gap:10px;
  backdrop-filter:blur(2px);
}
#loading.show { display:flex; }
.spinner {
  width:20px; height:20px; border:2px solid var(--border2);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- ═══════════════════ TOOLBAR ═══════════════════ -->
<div id="toolbar">
  <span id="app-title">⚡ Signal Equalizer</span>
  <div class="sep"></div>

  <div style="display:flex;align-items:center;gap:6px">
    <span class="lbl">Mode</span>
    <select id="mode-sel">
      <option value="instruments">🎸 Instruments</option>
      <option value="animals">🐾 Animals</option>
      <option value="voices">🗣 Voices</option>
      <option value="ecg">❤️ ECG</option>
      <option value="generic">⚙️ Generic</option>
    </select>
  </div>

  <div class="sep"></div>

  <label class="file-btn">
    📂 Load Signal
    <input type="file" id="file-signal" accept=".wav,.mp3,.ogg,.flac,.csv">
  </label>

  <div class="sep"></div>

  <div style="display:flex;align-items:center;gap:6px">
    <span class="lbl">Wavelet</span>
    <select id="wavelet-sel">
      <option value="fourier">Fourier (Standard)</option>
      <option value="db4">Daubechies db4</option>
      <option value="db6">Daubechies db6</option>
      <option value="sym5">Symlets sym5</option>
      <option value="coif3">Coiflets coif3</option>
    </select>
  </div>

  <div class="sep"></div>

  <div style="display:flex;align-items:center;gap:5px">
    <button class="btn" id="save-cfg-btn">📤 Save Config</button>
    <button class="btn" id="load-cfg-btn">📥 Load Config</button>
    <input type="file" id="file-config" accept=".json" style="display:none">
  </div>

  <div class="sep"></div>
  <button class="btn accent" id="ai-btn">🤖 AI Compare</button>

  <div class="spacer"></div>
  <span id="signal-info">No signal loaded</span>
  <div class="sep"></div>
  <span id="backend-status">● Connecting…</span>
</div>

<!-- ═══════════════════ VIEWERS ═══════════════════ -->
<div id="viewers-row">
  <div class="viewer-wrap">
    <span class="viewer-tag">INPUT</span>
    <span class="viewer-t" id="in-time">00:00.000</span>
    <canvas id="cv-input"  width="600" height="160"></canvas>
  </div>
  <div class="viewer-wrap">
    <span class="viewer-tag">OUTPUT</span>
    <span class="viewer-t" id="out-time">00:00.000</span>
    <canvas id="cv-output" width="600" height="160"></canvas>
  </div>
</div>

<!-- ═══════════════════ PLAYBACK BAR ══════════════ -->
<div id="pb-bar">
  <div style="display:flex;gap:4px">
    <button class="btn green" id="btn-play">▶ Play</button>
    <button class="btn" id="btn-pause">⏸ Pause</button>
    <button class="btn" id="btn-stop">⏹ Stop</button>
    <button class="btn" id="btn-audio">🔊 Audio</button>
  </div>
  <div class="sep"></div>
  <span class="lbl">Speed</span>
  <input type="range" class="speed-r" id="speed-r" min="25" max="400" value="100">
  <span id="speed-lbl">1.00×</span>
  <div class="sep"></div>
  <div style="display:flex;gap:4px">
    <button class="btn" id="btn-zi" title="Zoom In">🔍+</button>
    <button class="btn" id="btn-zo" title="Zoom Out">🔍−</button>
    <button class="btn" id="btn-pl" title="Pan Left">◀</button>
    <button class="btn" id="btn-pr" title="Pan Right">▶</button>
    <button class="btn" id="btn-rst">↺ Reset</button>
  </div>
  <div class="sep"></div>
  <div class="scale-grp">
    <span class="lbl">Scale</span>
    <label><input type="radio" name="fscale" value="linear" checked> Linear</label>
    <label><input type="radio" name="fscale" value="audiogram"> Audiogram</label>
  </div>
  <div class="sep"></div>
  <button class="btn" id="btn-spec">👁 Spectrograms</button>
  <div class="spacer"></div>
  <span id="pb-time">00:00.000</span>
</div>

<!-- ═══════════════════ ANALYSIS ROW ══════════════ -->
<div id="analysis-row">

  <!-- FFT Chart -->
  <div class="panel">
    <div class="p-head">
      <span class="p-title">Frequency Spectrum</span>
      <span style="font-size:11px;color:var(--muted)">
        <span style="color:#4a9eff">■</span> Input &nbsp;
        <span style="color:#ff4466">■</span> Output
      </span>
    </div>
    <div class="p-body"><canvas id="cv-freq"></canvas></div>
  </div>

  <!-- Spectrograms (two stacked) -->
  <div id="spec-col">
    <div class="panel">
      <div class="p-head"><span class="p-title">Input Spectrogram</span></div>
      <div class="p-body"><canvas id="cv-ispec" width="265" height="100"></canvas></div>
    </div>
    <div class="panel">
      <div class="p-head"><span class="p-title">Output Spectrogram</span></div>
      <div class="p-body"><canvas id="cv-ospec" width="265" height="100"></canvas></div>
    </div>
  </div>

</div>

<!-- ═══════════════════ EQUALIZER ═════════════════ -->
<div id="eq-wrap">
  <div id="eq-head">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="p-title">Equalizer</span>
      <span id="eq-mode-name" style="font-size:12px;color:var(--accent);font-weight:700"></span>
    </div>
    <div id="wv-result"></div>
  </div>
  <div id="eq-sliders"></div>
</div>

<!-- ═══════════════════ AI PANEL ══════════════════ -->
<div id="ai-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
    <span class="p-title">AI Analysis</span>
    <button class="btn red" style="padding:3px 9px;font-size:11px"
      onclick="document.getElementById('ai-panel').style.display='none'">✕</button>
  </div>
  <div id="ai-grid"></div>
</div>

<!-- ═══════════════════ LOADING + TOAST ═══════════ -->
<div id="loading"><div class="spinner"></div><span id="loading-msg">Processing…</span></div>
<div id="toast"></div>

<!-- ════════════════════ JAVASCRIPT ════════════════ -->
<script>
'use strict';

const BASE = 'http://localhost:8000';

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function showToast(msg, type = 'info', ms = 2800) {
  const el = document.getElementById('toast');
  el.className = '';
  el.textContent = msg;
  el.classList.add('show', type);
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function loading(show, msg = 'Processing…') {
  const el = document.getElementById('loading');
  document.getElementById('loading-msg').textContent = msg;
  el.classList.toggle('show', show);
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const ms = Math.floor((s % 1) * 1000);
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function dlJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
  a.click(); URL.revokeObjectURL(a.href);
}

async function readJSON(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => { try { res(JSON.parse(e.target.result)); } catch { rej(new Error('Invalid JSON')); } };
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsText(file);
  });
}

// Convert backend format → internal format
// Backend: {mode:"...", sliders:[{name,ranges:[{min,max}]}]}
// Internal:{name:"...", sliders:[{id,name,freq_ranges:[[min,max]]}]}
function normalize(raw) {
  const src = raw.sliders || raw.bands || [];
  return {
    name: raw.mode || raw.name || 'Unknown',
    sliders: src.map((s, i) => ({
      id:         s.id   != null  ? s.id : i + 1,
      name:       s.name || s.label || `Band ${i+1}`,
      freq_ranges:(s.ranges || s.freq_ranges || [])
                  .map(r => Array.isArray(r) ? r : [r.min, r.max])
    }))
  };
}

// Convert internal → backend format (for save)
function denormalize(cfg) {
  return {
    mode: cfg.name,
    sliders: cfg.sliders.map(s => ({
      id:   s.id,
      name: s.name,
      ranges: s.freq_ranges.map(r => ({ min: r[0], max: r[1] }))
    }))
  };
}

/* ═══════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════ */
const API = {
  async _f(path, opts = {}) {
    try {
      const r = await fetch(BASE + path, opts);
      return await r.json().catch(() => ({ error: 'Bad JSON' }));
    } catch (e) {
      return { error: e.message };
    }
  },
  ping:           ()          => API._f('/ping'),
  getSignal:      sid         => API._f(`/signal/${sid}`),
  loadSettings:   mode        => API._f(`/settings/${mode}`),
  getSpectrogram: sid         => API._f(`/spectrogram/${sid}`),
  wvCompare:      (sid, mode) => API._f(`/wavelet-compare/${sid}/${mode}`),
  upload:         file => {
    const fd = new FormData(); fd.append('file', file);
    return API._f('/upload', { method:'POST', body:fd });
  },
  equalize: (sid, gains, method, wavelet) =>
    API._f('/equalize', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ signal_id:sid, gains, method, wavelet })
    }),
  saveSettings: (modeName, config) =>
    API._f('/settings/save', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ mode_name:modeName, config })
    }),
  runAI: (sid, mode) =>
    API._f('/ai/run', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ signal_id:sid, mode })
    })
};

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const S = {
  mode:          'instruments',
  config:        null,        // normalized
  gains:         {},          // {id: 0.0-2.0}
  inputSid:      null,
  inputSamples:  null,
  outputSamples: null,
  outputB64:     null,
  sr:            44100,
  fftIn:         null,
  fftOut:        null,
  specIn:        null,
  specOut:       null,
  wvMethod:      'fourier',
  fftScale:      'linear',
  isPlaying:     false,
  currentTime:   0,
};

/* ═══════════════════════════════════════════════════
   CINE VIEWER
═══════════════════════════════════════════════════ */
class CineViewer {
  constructor(id, color = '#4a9eff') {
    this.cv    = document.getElementById(id);
    this.ctx   = this.cv.getContext('2d');
    this.color = color;
    this.sig   = null;
    this.sr    = 44100;
    this.vs    = 0;   // viewStart (samples)
    this.ve    = 0;   // viewEnd   (samples)
    this.speed = 1;
    this.anim  = null;
    this.partner   = null;
    this._sync     = false;
    this._drag     = false;
    this._dragX    = 0;
    this._dragVS   = 0;
    this._setup();
    this._empty();
  }

  _setup() {
    const c = this.cv;
    c.style.cursor = 'grab';
    c.addEventListener('mousedown', e => {
      if (!this.sig) return;
      this._drag = true; this._dragX = e.offsetX; this._dragVS = this.vs;
      c.style.cursor = 'grabbing';
    });
    c.addEventListener('mousemove', e => {
      if (!this._drag || !this.sig) return;
      const dx = e.offsetX - this._dragX;
      const win = this.ve - this.vs;
      const shift = -(dx / c.clientWidth) * win;
      this.vs = Math.max(0, this._dragVS + shift);
      this.ve = this.vs + win;
      if (this.ve > this.sig.length) { this.ve = this.sig.length; this.vs = this.ve - win; }
      this.draw(); this._sp();
    });
    c.addEventListener('mouseup',    () => { this._drag = false; c.style.cursor = 'grab'; });
    c.addEventListener('mouseleave', () => { this._drag = false; c.style.cursor = 'grab'; });
    c.addEventListener('wheel', e => {
      e.preventDefault();
      if (!this.sig) return;
      this.zoom(e.deltaY > 0 ? 1.15 : 0.87);
    }, { passive: false });
  }

  load(samples, sr) {
    this.sig = samples; this.sr = sr;
    this.vs = 0; this.ve = Math.min(samples.length, Math.floor(sr * 0.5));
    this.draw();
  }

  draw() {
    const { cv: c, ctx, sig, vs, ve, color } = this;
    const w = c.width, h = c.height, mid = h / 2;
    ctx.fillStyle = '#080818';
    ctx.fillRect(0, 0, w, h);

    if (!sig) { this._empty(); return; }

    // Grid
    ctx.strokeStyle = '#14143a'; ctx.lineWidth = 0.5;
    for (let i = 1; i < 10; i++) {
      const x = (i/10)*w;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
    }
    [0.25,0.5,0.75].forEach(f => {
      ctx.beginPath(); ctx.moveTo(0,f*h); ctx.lineTo(w,f*h); ctx.stroke();
    });

    // Zero line
    ctx.strokeStyle = '#1e1e55'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(w,mid); ctx.stroke();

    // Waveform
    const s0 = Math.floor(Math.max(0,vs));
    const s1 = Math.ceil(Math.min(sig.length,ve));
    const sl = sig.subarray(s0, s1);
    const ln = sl.length;
    if (!ln) return;
    const amp = mid * 0.86;
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.beginPath();

    if (ln <= w) {
      const ppx = w / ln;
      for (let i = 0; i < ln; i++) {
        const x = i*ppx, y = mid - sl[i]*amp;
        i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
      }
    } else {
      const spp = ln / w;
      for (let px = 0; px < w; px++) {
        const a = Math.floor(px*spp), b = Math.floor((px+1)*spp);
        let mn = Infinity, mx = -Infinity;
        for (let k = a; k < b && k < ln; k++) {
          if (sl[k] < mn) mn = sl[k];
          if (sl[k] > mx) mx = sl[k];
        }
        const yH = mid-mx*amp, yL = mid-mn*amp;
        px ? ctx.lineTo(px,yH) : ctx.moveTo(px,yH);
        ctx.lineTo(px,yL);
      }
    }
    ctx.stroke();

    // Time labels
    ctx.fillStyle = '#383870'; ctx.font = '10px monospace';
    ctx.textAlign = 'left';  ctx.fillText(fmt(vs/this.sr), 5, h-4);
    ctx.textAlign = 'right'; ctx.fillText(fmt(ve/this.sr), w-5, h-4);

    // Playhead
    if (S.isPlaying) {
      const cur = S.currentTime * this.sr;
      if (cur >= vs && cur <= ve) {
        const px = ((cur-vs)/(ve-vs))*w;
        ctx.strokeStyle = '#ffbb44'; ctx.lineWidth = 2;
        ctx.setLineDash([5,4]);
        ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  _empty() {
    const { cv: c, ctx } = this;
    ctx.fillStyle = '#080818'; ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle = '#2a2a55'; ctx.font = '13px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('Upload a signal to display', c.width/2, c.height/2 - 8);
    ctx.font = '11px Segoe UI'; ctx.fillStyle = '#1a1a40';
    ctx.fillText('WAV · MP3 · OGG · FLAC', c.width/2, c.height/2+12);
  }

  play() {
    if (!this.sig || S.isPlaying) return;
    S.isPlaying = true;
    const step = () => {
      if (!S.isPlaying) return;
      const win = this.ve - this.vs;
      const adv = Math.floor((this.sr/60) * this.speed);
      if (this.vs + win + adv >= this.sig.length) { this.stop(); return; }
      this.vs += adv; this.ve = this.vs + win;
      S.currentTime = this.vs / this.sr;
      this.draw(); this._sp();
      this.anim = requestAnimationFrame(step);
    };
    this.anim = requestAnimationFrame(step);
  }

  pause() {
    S.isPlaying = false;
    cancelAnimationFrame(this.anim);
  }

  stop() {
    S.isPlaying = false; S.currentTime = 0;
    cancelAnimationFrame(this.anim);
    if (this.sig) {
      this.vs = 0; this.ve = Math.min(this.sig.length, Math.floor(this.sr * 0.5));
    }
    this.draw(); this._sp();
  }

  setSpeed(s) { this.speed = Math.max(0.25, Math.min(4, s)); }

  zoom(f) {
    if (!this.sig) return;
    const c = (this.vs + this.ve) / 2;
    const h = Math.max(this.sr*0.05, Math.min(this.sig.length/2, (this.ve-this.vs)/2 * f));
    this.vs = Math.max(0, c-h);
    this.ve = Math.min(this.sig.length, c+h);
    this.draw(); this._sp();
  }

  pan(dir) {
    if (!this.sig) return;
    const win = this.ve - this.vs;
    this.vs = Math.max(0, this.vs + win*0.2*dir);
    this.ve = this.vs + win;
    if (this.ve > this.sig.length) { this.ve = this.sig.length; this.vs = this.ve-win; }
    this.draw(); this._sp();
  }

  reset() {
    if (!this.sig) return;
    this.vs = 0; this.ve = Math.min(this.sig.length, this.sr*5);
    this.draw(); this._sp();
  }

  syncWith(other) { this.partner = other; other.partner = this; }

  _sp() {  // sync partner
    if (!this.partner || this._sync) return;
    this.partner._sync = true;
    this.partner.vs = Math.max(0, this.vs);
    this.partner.ve = Math.min(this.partner.sig?.length || this.ve, this.ve);
    this.partner.draw();
    this.partner._sync = false;
  }
}

/* ═══════════════════════════════════════════════════
   SPECTROGRAM
═══════════════════════════════════════════════════ */
class Spectrogram {
  constructor(id) {
    this.cv  = document.getElementById(id);
    this.ctx = this.cv.getContext('2d');
    this._empty();
  }
  _empty() {
    this.ctx.fillStyle = '#080818';
    this.ctx.fillRect(0,0,this.cv.width,this.cv.height);
  }
  draw(data) {
    if (!data?.length || !data[0]?.length) return;
    const { cv:c, ctx } = this;
    const rows = data.length, cols = data[0].length;
    const img = ctx.createImageData(c.width, c.height);
    const px  = img.data;
    for (let ri = 0; ri < rows; ri++) {
      for (let ci = 0; ci < cols; ci++) {
        const v  = data[ri][ci];
        // viridis-ish: dark-blue → purple → orange → yellow
        const r  = Math.max(0, Math.min(255, (v*2.2-0.5)*255));
        const g  = Math.max(0, Math.min(255,  v*v*220));
        const b  = Math.max(0, Math.min(255, (1-v)*190+20));
        const xs = Math.floor(ci   * c.width  / cols);
        const xe = Math.floor((ci+1)* c.width  / cols);
        const ys = Math.floor((rows-ri-1) * c.height / rows);
        const ye = Math.floor((rows-ri)   * c.height / rows);
        for (let y=ys; y<ye; y++) for (let x=xs; x<xe; x++) {
          const i=(y*c.width+x)*4; px[i]=r; px[i+1]=g; px[i+2]=b; px[i+3]=255;
        }
      }
    }
    ctx.putImageData(img,0,0);
  }
  update(d) { this.draw(d); }
}

/* ═══════════════════════════════════════════════════
   FREQ PLOT
═══════════════════════════════════════════════════ */
class FreqPlot {
  constructor(id) {
    this.cv    = document.getElementById(id);
    this.chart = null;
    this.scale = 'linear';
    this._in   = null;
    this._out  = null;
    this._init();
  }
  _init() {
    if (this.chart) this.chart.destroy();
    this.chart = new Chart(this.cv, {
      type:'line',
      data:{ datasets:[
        { label:'Input',  data:[], borderColor:'#4a9eff', backgroundColor:'transparent', pointRadius:0, borderWidth:1.5, tension:0.1 },
        { label:'Output', data:[], borderColor:'#ff4466', backgroundColor:'transparent', pointRadius:0, borderWidth:1.5, tension:0.1 },
      ]},
      options:{
        animation:false, responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#5050a0', font:{size:11}, boxWidth:12 } } },
        scales:{
          x:{ type:'linear',
              title:{ display:true, text:'Frequency (Hz)', color:'#404080', font:{size:10} },
              ticks:{ color:'#404070', maxTicksLimit:12, font:{size:10} },
              grid:{ color:'#111130' } },
          y:{ title:{ display:true, text:'Magnitude', color:'#404080', font:{size:10} },
              ticks:{ color:'#404070', font:{size:10} },
              grid:{ color:'#111130' } }
        }
      }
    });
  }
  draw(inFFT, outFFT) { this._in=inFFT; this._out=outFFT||inFFT; this._render(); }
  updateOut(outFFT)   { this._out=outFFT; this._render(); }
  setScale(s)         { this.scale=s; this._render(); }
  _render() {
    if (!this._in || !this.chart) return;
    const inp=this._in, out=this._out||inp;
    if (this.scale==='audiogram') {
      const afreqs=[125,250,500,1000,2000,4000,8000];
      const near=(arr,hz)=>arr.reduce((b,x)=>Math.abs(x.frequency-hz)<Math.abs(b.frequency-hz)?x:b);
      this.chart.data.datasets[0].data = afreqs.map(f=>({ x:f, y:near(inp,f).magnitude }));
      this.chart.data.datasets[1].data = afreqs.map(f=>({ x:f, y:near(out,f).magnitude }));
      this.chart.options.scales.x.type='logarithmic';
      this.chart.options.scales.x.title.text='Frequency (Hz) — Audiogram';
      this.chart.options.scales.x.min=100; this.chart.options.scales.x.max=9000;
    } else {
      const step = Math.max(1, Math.floor(inp.length/800));
      this.chart.data.datasets[0].data = inp.filter((_,i)=>i%step===0).map(d=>({x:d.frequency,y:d.magnitude}));
      this.chart.data.datasets[1].data = out.filter((_,i)=>i%step===0).map(d=>({x:d.frequency,y:d.magnitude}));
      this.chart.options.scales.x.type='linear';
      this.chart.options.scales.x.title.text='Frequency (Hz)';
      delete this.chart.options.scales.x.min; delete this.chart.options.scales.x.max;
    }
    this.chart.update('none');
  }
}

/* ═══════════════════════════════════════════════════
   EQUALIZER PANEL
═══════════════════════════════════════════════════ */
class EQPanel {
  constructor(id) {
    this.el = document.getElementById(id);
    this.onChange = null;
  }
  build(config) {
    this.el.innerHTML = '';
    if (!config?.sliders?.length) {
      if (config?.name === 'Generic') { this._addBtn(); return; }
      const d = document.createElement('div');
      d.className='eq-empty'; d.textContent='No bands defined for this mode';
      this.el.appendChild(d); return;
    }
    config.sliders.forEach(sl => {
      const col = document.createElement('div');
      col.className = 'sl-col';
      const vl = document.createElement('div'); vl.className='sl-val'; vl.textContent='1.0×';
      const inp = document.createElement('input');
      inp.type='range'; inp.className='eq-slider';
      inp.min=0; inp.max=200; inp.value=100;
      inp.title = sl.freq_ranges.map(r=>`${r[0]}–${r[1]} Hz`).join(', ');
      const nl = document.createElement('div'); nl.className='sl-name'; nl.textContent=sl.name;
      inp.addEventListener('input', () => {
        const gain = inp.value/100;
        vl.textContent = gain.toFixed(1)+'×';
        S.gains[sl.id] = gain;
        if (this.onChange) this.onChange();
      });
      col.append(vl, inp, nl);
      this.el.appendChild(col);
      S.gains[sl.id] = 1.0;
    });
    if (config.name === 'Generic') this._addBtn();
  }
  _addBtn() {
    const b = document.createElement('button');
    b.className='add-btn'; b.textContent='＋ Add Band';
    b.onclick = () => {
      const name = prompt('Band name (e.g. "Bass"):');
      if (!name?.trim()) return;
      const mn = parseFloat(prompt('Min frequency (Hz):'));
      const mx = parseFloat(prompt('Max frequency (Hz):'));
      if (isNaN(mn)||isNaN(mx)||mn>=mx) { alert('Invalid range'); return; }
      if (!S.config.sliders) S.config.sliders=[];
      S.config.sliders.push({ id:S.config.sliders.length+1, name:name.trim(), freq_ranges:[[mn,mx]] });
      this.build(S.config);
      if (this.onChange) this.onChange();
    };
    this.el.appendChild(b);
  }
}

/* ═══════════════════════════════════════════════════
   AUDIO PLAYER
═══════════════════════════════════════════════════ */
const Audio = {
  _ctx: null, _src: null, isPlaying: false,
  _ac() { if (!this._ctx) this._ctx=new AudioContext(); return this._ctx; },
  async play(b64) {
    this.stop();
    try {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const ctx = this._ac();
      if (ctx.state==='suspended') await ctx.resume();
      const buf = await ctx.decodeAudioData(bytes.buffer.slice(0));
      this._src = ctx.createBufferSource();
      this._src.buffer=buf; this._src.connect(ctx.destination);
      this._src.start(0); this.isPlaying=true;
      this._src.onended = () => { this.isPlaying=false; document.getElementById('btn-audio').textContent='🔊 Audio'; };
    } catch(e) { showToast('Audio failed: '+e.message,'error'); }
  },
  stop() {
    try { this._src?.stop(); } catch {}
    this._src=null; this.isPlaying=false;
  },
  setSpeed(s) { if (this._src) this._src.playbackRate.value=s; }
};

/* ═══════════════════════════════════════════════════
   INIT COMPONENTS
═══════════════════════════════════════════════════ */
const inV  = new CineViewer('cv-input',  '#4a9eff');
const outV = new CineViewer('cv-output', '#ff4466');
inV.syncWith(outV);

const inSpec  = new Spectrogram('cv-ispec');
const outSpec = new Spectrogram('cv-ospec');
const fPlot   = new FreqPlot('cv-freq');
const eqPanel = new EQPanel('eq-sliders');
eqPanel.onChange = runEqualize;

/* ═══════════════════════════════════════════════════
   CORE: EQUALIZE
═══════════════════════════════════════════════════ */
let _eqBusy = false;

async function runEqualize() {
  if (_eqBusy || !S.inputSid || !S.config?.sliders?.length) return;
  _eqBusy = true;
  try {
    const gains = S.config.sliders.map(sl => ({
      band_id:     sl.id,
      freq_ranges: sl.freq_ranges,
      gain:        S.gains[sl.id] ?? 1.0
    }));
    const method  = S.wvMethod === 'fourier' ? 'fourier' : 'wavelet';
    const wavelet = S.wvMethod === 'fourier' ? 'db4' : S.wvMethod;

    const r = await API.equalize(S.inputSid, gains, method, wavelet);
    if (r.error) { console.error('Equalize:', r.error); _eqBusy=false; return; }

    // Decode base64 WAV → Float32Array
    if (r.output_signal_b64) {
      S.outputB64 = r.output_signal_b64;
      try {
        const bin  = atob(r.output_signal_b64);
        const bytes= new Uint8Array(bin.length);
        for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
        const tmpCtx = new OfflineAudioContext(1,1,S.sr);
        const buf  = await tmpCtx.decodeAudioData(bytes.buffer.slice(0));
        S.outputSamples = buf.getChannelData(0);
        outV.load(S.outputSamples, buf.sampleRate);
      } catch {}
    }

    if (r.fft_input && r.fft_output) {
      S.fftIn=r.fft_input; S.fftOut=r.fft_output;
      fPlot.draw(r.fft_input, r.fft_output);
    }

    if (r.spectrogram_output) {
      S.specOut = r.spectrogram_output;
      outSpec.draw(r.spectrogram_output);
    }
  } finally { _eqBusy = false; }
}

/* ═══════════════════════════════════════════════════
   LOAD MODE
═══════════════════════════════════════════════════ */
async function loadMode(mode) {
  try {
    const raw = await API.loadSettings(mode);
    if (raw.error) { showToast('Mode error: '+raw.error,'error'); return; }
    const cfg = normalize(raw);
    S.mode=mode; S.config=cfg; S.gains={};
    _eqBusy=true; eqPanel.build(cfg); _eqBusy=false;
    const lbl = document.getElementById('eq-mode-name');
    if (lbl) lbl.textContent = cfg.name;
    if (S.inputSid) runEqualize();
  } catch(e) { showToast('Mode load failed: '+e.message,'error'); }
}

/* ═══════════════════════════════════════════════════
   UPLOAD
═══════════════════════════════════════════════════ */
async function handleUpload(file) {
  loading(true, 'Uploading "'+file.name+'"…');
  try {
    const r = await API.upload(file);
    if (r.error) throw new Error(r.error);

    S.inputSid = r.signal_id; S.sr = r.sample_rate;
    document.getElementById('signal-info').textContent =
      `${file.name}  ·  ${r.duration.toFixed(2)}s  ·  ${(r.sample_rate/1000).toFixed(1)} kHz`;

    // Decode locally for waveform (faster + more reliable)
    try {
      const ab  = await file.arrayBuffer();
      const ac  = new AudioContext();
      const buf = await ac.decodeAudioData(ab);
      await ac.close();
      S.inputSamples = new Float32Array(buf.getChannelData(0));
      inV.load(S.inputSamples, buf.sampleRate);
    } catch {
      // Fallback: get from server
      const sr = await API.getSignal(r.signal_id);
      if (sr.samples) { S.inputSamples=new Float32Array(sr.samples); inV.load(S.inputSamples, sr.sample_rate); }
    }

    // Input spectrogram
    loading(true, 'Computing spectrogram…');
    const sp = await API.getSpectrogram(r.signal_id);
    if (sp.spectrogram) { S.specIn=sp.spectrogram; inSpec.draw(sp.spectrogram); }

    loading(true, 'Equalizing…');
    await runEqualize();
    showToast('✅ "'+file.name+'" loaded','success');
  } catch(e) {
    showToast('❌ Upload failed: '+e.message,'error',6000);
  } finally { loading(false); }
}

/* ═══════════════════════════════════════════════════
   AI COMPARE
═══════════════════════════════════════════════════ */
async function runAI() {
  if (!S.inputSid) { showToast('Upload a signal first','error'); return; }
  const btn = document.getElementById('ai-btn');
  const grid = document.getElementById('ai-grid');
  const panel = document.getElementById('ai-panel');
  btn.disabled=true; btn.textContent='⏳ Analyzing…';
  panel.style.display='block';
  grid.innerHTML='<p style="color:var(--muted);padding:8px">Running analysis…</p>';

  const card = (t,v,sub='') =>
    `<div class="ai-card"><div class="ai-ct">${t}</div><div class="ai-cv">${v}</div>`+
    (sub?`<div style="font-size:10px;color:var(--muted);margin-top:3px">${sub}</div>`:'')+`</div>`;

  try {
    const r = await API.runAI(S.inputSid, S.mode);
    let h='';
    if (r.error) {
      h = card('Status','⚠️','AI model not implemented yet — see backend');
    } else if (S.mode==='ecg') {
      h += card('Heart Rate',  (r.heart_rate||0).toFixed(1)+' bpm');
      h += card('Condition',   r.condition||r.classification||'—');
      h += card('Peaks',       (r.peak_count||0)+' found');
      h += card('RR Std',      (r.rr_std_ms||0).toFixed(1)+' ms');
    } else {
      h += card('Mode',        r.mode||S.mode);
      h += card('Peak Freq',   (r.peak_frequency||0).toFixed(0)+' Hz');
      h += card('RMS Energy',  (r.rms_energy||0).toFixed(4));
      h += card('Peak Amp',    (r.peak_amplitude||0).toFixed(4));
      if (r.snr_db!=null) h += card('SNR',r.snr_db.toFixed(1)+' dB');
    }
    grid.innerHTML = h;
  } catch(e) {
    grid.innerHTML=`<p style="color:var(--red);padding:8px">❌ ${e.message}</p>`;
  } finally {
    btn.disabled=false; btn.textContent='🤖 AI Compare';
  }
}

   WAVELET COMPARE

async function wvCompare() {
  if (!S.inputSid) return;

  const el = document.getElementById('wv-result');

    `Better: <b style="color:var(--gold)">${r.better.toUpperCase()}</b>`;
}

  } catch {
    bsEl.textContent='● Backend Offline'; bsEl.style.color='#ff5f6d';
    showToast('⚠️ Backend not running! cd backend → uvicorn main:app --reload','error',10000);
  }

  loadMode('instruments');

  // Upload
  document.getElementById('file-signal').addEventListener('change', e => {
    const f=e.target.files[0]; if(f) handleUpload(f); e.target.value='';

    S.wvMethod = e.target.value;
    runEqualize();
    if (S.inputSid) setTimeout(wvCompare, 1200);
  });

  // Scale toggle
  document.querySelectorAll('input[name="fscale"]').forEach(r =>
    r.addEventListener('change', e => fPlot.setScale(e.target.value))
  );

  // Spectrogram toggle
  let specVis=true;
  document.getElementById('btn-spec').addEventListener('click', () => {
    specVis = !specVis;
    const col = document.getElementById('spec-col');
    col.style.display = specVis ? '' : 'none';
    document.getElementById('analysis-row').style.gridTemplateColumns =
      specVis ? '1fr 265px 265px' : '1fr';
    document.getElementById('btn-spec').textContent = specVis ? '👁 Spectrograms' : '📊 Spectrogram ○';
    setTimeout(resize, 60);
  });

  // Playback
  document.getElementById('btn-play').addEventListener('click', () => { inV.play(); outV.play(); });
  document.getElementById('btn-pause').addEventListener('click',() => { inV.pause(); outV.pause(); });
  document.getElementById('btn-stop').addEventListener('click', () => {
    inV.stop(); outV.stop(); Audio.stop();
    document.getElementById('btn-audio').textContent='🔊 Audio';
  });

  // Audio
  document.getElementById('btn-audio').addEventListener('click', async () => {
    const btn = document.getElementById('btn-audio');
    if (Audio.isPlaying) { Audio.stop(); btn.textContent='🔊 Audio'; return; }
    if (!S.outputB64) { showToast('Equalize first','error'); return; }
    btn.textContent='⏹ Stop Audio';
    await Audio.play(S.outputB64);
  });

  // Speed
  document.getElementById('speed-r').addEventListener('input', e => {
    const s = e.target.value/100;
    document.getElementById('speed-lbl').textContent=s.toFixed(2)+'×';
    inV.setSpeed(s); outV.setSpeed(s); Audio.setSpeed(s);
  });

  // Zoom / Pan / Reset
  document.getElementById('btn-zi').addEventListener('click',  ()=>inV.zoom(0.5));
  document.getElementById('btn-zo').addEventListener('click',  ()=>inV.zoom(2.0));
  document.getElementById('btn-pl').addEventListener('click',  ()=>inV.pan(-1));
  document.getElementById('btn-pr').addEventListener('click',  ()=>inV.pan(1));
  document.getElementById('btn-rst').addEventListener('click', ()=>{ inV.reset(); outV.reset(); });

  // Save config
  document.getElementById('save-cfg-btn').addEventListener('click', () => {
    if (!S.config) { showToast('No config loaded','error'); return; }
    dlJSON(denormalize(S.config), S.mode+'.json');
    showToast('Config saved ✅','success');
  });

  // Load config
  document.getElementById('load-cfg-btn').addEventListener('click', () =>
    document.getElementById('file-config').click()
  );
  document.getElementById('file-config').addEventListener('change', async e => {
    const f=e.target.files[0]; if(!f) return;
    try {
      const raw = await readJSON(f);
      const cfg = normalize(raw);
      _eqBusy=true; eqPanel.build(cfg); _eqBusy=false;
      showToast('Config loaded: '+cfg.name,'success');
      if (S.inputSid) runEqualize();
    } catch(err) { showToast('Load failed: '+err.message,'error'); }
    e.target.value='';
  });

  // AI
  document.getElementById('ai-btn').addEventListener('click', runAI);

  // Time display
  setInterval(() => {
    const t = fmt(S.currentTime||0);
    ['pb-time','in-time','out-time'].forEach(id => {
      const el=document.getElementById(id); if(el) el.textContent=t;
    });
  }, 100);

  console.log('✅ Signal Equalizer ready');
});
</script>
</body>
</html>
